<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A1628">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>DigitalOne Kiosko</title>
    <link rel="manifest" href="/kiosko/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/mobile/icon.svg">
    <link rel="stylesheet" href="/kiosko/style.css">
</head>
<body>
    <!-- SETUP (primera vez) -->
    <div id="screen-setup" class="screen active">
        <div class="setup-container">
            <div class="logo">
                <div class="logo-icon">&#9646;</div>
                <h1>Digital One</h1>
                <p class="subtitle">Configurar Kiosko</p>
            </div>
            <form id="form-setup" autocomplete="off">
                <div id="setup-error" class="error-banner hidden"></div>
                <label for="input-deviceid">Device ID del Kiosko</label>
                <input type="text" id="input-deviceid" placeholder="KIOSKO-XXXXXXXXXXXX" required>
                <p class="help-text">Ingrese el Device ID asignado en el portal de administracion.</p>
                <button type="submit" class="btn-primary">ACTIVAR KIOSKO</button>
            </form>
        </div>
    </div>

    <!-- SCANNER -->
    <div id="screen-scanner" class="screen">
        <!-- Header -->
        <div class="kiosko-header">
            <div class="header-brand">
                <div class="brand-dot"></div>
                <div>
                    <div class="brand-name">Digital One</div>
                    <div id="header-sucursal" class="brand-sub"></div>
                </div>
            </div>
            <div id="header-clock" class="header-clock">--:--</div>
        </div>
        <div class="accent-line"></div>

        <!-- Camera area -->
        <div class="scanner-area">
            <div id="qr-reader" class="qr-reader"></div>
            <div class="scanner-instruction">
                <div class="scanner-icon">&#9634;</div>
                <div>Muestre su QR frente a la camara</div>
            </div>
        </div>

        <!-- Result overlay (appears after scan) -->
        <div id="scan-result" class="scan-result hidden">
            <div class="result-card">
                <img id="result-foto" class="result-foto hidden" alt="">
                <div class="result-icon-placeholder" id="result-icon">
                    <svg viewBox="0 0 40 40"><circle cx="20" cy="16" r="8" fill="#4A6A8A" opacity="0.5"/><ellipse cx="20" cy="34" rx="12" ry="8" fill="#4A6A8A" opacity="0.3"/></svg>
                </div>
                <div id="result-nombre" class="result-nombre"></div>
                <div id="result-tipo" class="result-tipo"></div>
                <div id="result-hora" class="result-hora"></div>
                <div id="result-sucursal" class="result-sucursal"></div>
            </div>
        </div>

        <!-- Error overlay -->
        <div id="scan-error" class="scan-error hidden">
            <div class="error-card">
                <div class="error-icon">&#10007;</div>
                <div id="error-mensaje" class="error-mensaje"></div>
            </div>
        </div>

        <!-- Status bar -->
        <div class="kiosko-footer">
            <div id="footer-empresa" class="footer-empresa"></div>
            <button id="btn-reset" class="btn-reset" title="Reconfigurar">&#9881;</button>
        </div>
    </div>

    <script src="/kiosko/html5-qrcode.min.js"></script>
    <script src="/kiosko/app.js"></script>
</body>
</html>
