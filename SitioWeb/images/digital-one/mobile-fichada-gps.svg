<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 780" width="440" height="780" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="55%" stop-color="#0D1F3C"/>
      <stop offset="100%" stop-color="#0A2240"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C9A7"/>
      <stop offset="100%" stop-color="#0080FF"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#162440" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0E1A30" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C9A7"/>
      <stop offset="100%" stop-color="#00E5B8"/>
    </linearGradient>
    <linearGradient id="mapGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D2137"/>
      <stop offset="100%" stop-color="#071428"/>
    </linearGradient>
    <linearGradient id="gpsRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00C9A7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0080FF" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00D4AF"/>
      <stop offset="100%" stop-color="#00A58A"/>
    </linearGradient>
    <linearGradient id="phoneFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A2E"/>
      <stop offset="50%" stop-color="#1A1A1E"/>
      <stop offset="100%" stop-color="#2A2A2E"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="mapGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="screenClip">
      <rect x="28" y="28" width="384" height="724" rx="28"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="440" height="780" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#FFFFFF" stroke-width="0.5">
    <line x1="0" y1="100" x2="440" y2="100"/>
    <line x1="0" y1="200" x2="440" y2="200"/>
    <line x1="0" y1="300" x2="440" y2="300"/>
    <line x1="0" y1="400" x2="440" y2="400"/>
    <line x1="0" y1="500" x2="440" y2="500"/>
    <line x1="0" y1="600" x2="440" y2="600"/>
    <line x1="0" y1="700" x2="440" y2="700"/>
    <line x1="110" y1="0" x2="110" y2="780"/>
    <line x1="220" y1="0" x2="220" y2="780"/>
    <line x1="330" y1="0" x2="330" y2="780"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="220" cy="380" r="260" fill="#00C9A7" opacity="0.04"/>
  <circle cx="350" cy="200" r="150" fill="#0080FF" opacity="0.04"/>

  <!-- ====== PHONE FRAME ====== -->
  <rect x="20" y="20" width="400" height="740" rx="36" fill="url(#phoneFrame)" stroke="#3A3A3E" stroke-width="1.5"/>
  <!-- Screen area -->
  <rect x="28" y="28" width="384" height="724" rx="28" fill="#071428"/>

  <!-- Clipped content -->
  <g clip-path="url(#screenClip)">

    <!-- ====== STATUS BAR ====== -->
    <rect x="28" y="28" width="384" height="36" fill="#0A1628"/>
    <text x="48" y="51" fill="#6B8DB5" font-size="12" font-weight="600">9:41</text>
    <!-- Signal bars -->
    <rect x="340" y="41" width="3" height="8" rx="1" fill="#6B8DB5"/>
    <rect x="345" y="39" width="3" height="10" rx="1" fill="#6B8DB5"/>
    <rect x="350" y="37" width="3" height="12" rx="1" fill="#6B8DB5"/>
    <rect x="355" y="35" width="3" height="14" rx="1" fill="#6B8DB5"/>
    <!-- WiFi icon -->
    <path d="M370 46 Q375 38 380 46" stroke="#6B8DB5" stroke-width="1.5" fill="none"/>
    <path d="M366 42 Q375 32 384 42" stroke="#6B8DB5" stroke-width="1.2" fill="none" opacity="0.6"/>
    <!-- Battery -->
    <rect x="392" y="40" width="16" height="9" rx="2" fill="none" stroke="#6B8DB5" stroke-width="1"/>
    <rect x="408" y="43" width="2" height="3" rx="1" fill="#6B8DB5"/>
    <rect x="394" y="42" width="10" height="5" rx="1" fill="#00C9A7"/>

    <!-- ====== APP HEADER ====== -->
    <rect x="28" y="64" width="384" height="56" fill="#0D1F3C"/>
    <circle cx="58" cy="92" r="10" fill="#00C9A7" opacity="0.15"/>
    <circle cx="58" cy="92" r="6" fill="#00C9A7" opacity="0.3"/>
    <circle cx="58" cy="92" r="3" fill="#00C9A7"/>
    <text x="76" y="89" fill="#FFFFFF" font-size="15" font-weight="700">Digital One</text>
    <text x="76" y="104" fill="#6B8DB5" font-size="10">Fichada Móvil</text>
    <!-- Menu icon -->
    <line x1="378" y1="85" x2="396" y2="85" stroke="#6B8DB5" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="378" y1="92" x2="396" y2="92" stroke="#6B8DB5" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="378" y1="99" x2="396" y2="99" stroke="#6B8DB5" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Divider -->
    <rect x="28" y="120" width="384" height="3" fill="url(#accentGrad)"/>

    <!-- ====== SUCURSAL & TIME ====== -->
    <rect x="28" y="123" width="384" height="90" fill="#0A1628"/>
    <text x="220" y="152" fill="#4A6A8A" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="1.5">SUCURSAL</text>
    <text x="220" y="172" fill="#FFFFFF" font-size="15" font-weight="600" text-anchor="middle">Administración Dardo Rocha</text>
    <text x="220" y="200" fill="#00C9A7" font-size="28" font-weight="700" text-anchor="middle">08:47</text>

    <!-- ====== MAP AREA ====== -->
    <rect x="28" y="213" width="384" height="260" fill="url(#mapGrad)"/>

    <!-- Map grid (simulated streets) -->
    <g opacity="0.08" stroke="#00C9A7" stroke-width="0.8">
      <!-- Horizontal streets -->
      <line x1="28" y1="253" x2="412" y2="253"/>
      <line x1="28" y1="293" x2="412" y2="293"/>
      <line x1="28" y1="333" x2="412" y2="333"/>
      <line x1="28" y1="373" x2="412" y2="373"/>
      <line x1="28" y1="413" x2="412" y2="413"/>
      <line x1="28" y1="453" x2="412" y2="453"/>
      <!-- Vertical streets -->
      <line x1="68" y1="213" x2="68" y2="473"/>
      <line x1="128" y1="213" x2="128" y2="473"/>
      <line x1="188" y1="213" x2="188" y2="473"/>
      <line x1="258" y1="213" x2="258" y2="473"/>
      <line x1="318" y1="213" x2="318" y2="473"/>
      <line x1="378" y1="213" x2="378" y2="473"/>
    </g>

    <!-- Map blocks (simulated buildings) -->
    <g opacity="0.06" fill="#00C9A7">
      <rect x="75" y="260" width="48" height="28" rx="3"/>
      <rect x="135" y="260" width="48" height="28" rx="3"/>
      <rect x="265" y="260" width="48" height="28" rx="3"/>
      <rect x="325" y="260" width="48" height="28" rx="3"/>
      <rect x="75" y="340" width="48" height="28" rx="3"/>
      <rect x="135" y="340" width="48" height="28" rx="3"/>
      <rect x="265" y="340" width="48" height="28" rx="3"/>
      <rect x="325" y="340" width="48" height="28" rx="3"/>
      <rect x="75" y="420" width="48" height="28" rx="3"/>
      <rect x="135" y="420" width="48" height="28" rx="3"/>
      <rect x="265" y="420" width="48" height="28" rx="3"/>
      <rect x="325" y="420" width="48" height="28" rx="3"/>
    </g>

    <!-- GPS range circles (animated feel) -->
    <circle cx="220" cy="343" r="100" fill="none" stroke="url(#gpsRing)" stroke-width="1.5" opacity="0.3"/>
    <circle cx="220" cy="343" r="70" fill="none" stroke="url(#gpsRing)" stroke-width="1.5" opacity="0.5"/>
    <circle cx="220" cy="343" r="40" fill="none" stroke="#00C9A7" stroke-width="2" opacity="0.7"/>

    <!-- GPS radius fill -->
    <circle cx="220" cy="343" r="70" fill="#00C9A7" opacity="0.06" filter="url(#mapGlow)"/>

    <!-- Location pin (user) -->
    <circle cx="220" cy="343" r="8" fill="#00C9A7" opacity="0.3"/>
    <circle cx="220" cy="343" r="5" fill="#00C9A7"/>
    <circle cx="220" cy="343" r="2" fill="#FFFFFF"/>

    <!-- Sucursal pin -->
    <g transform="translate(220, 310)">
      <path d="M0-20 C-11-20 -18-13 -18-4 C-18 8 0 22 0 22 C0 22 18 8 18-4 C18-13 11-20 0-20Z" fill="#0080FF" stroke="#00B4FF" stroke-width="1"/>
      <circle cx="0" cy="-4" r="6" fill="#0D1F3C"/>
      <circle cx="0" cy="-4" r="3" fill="#00B4FF"/>
    </g>

    <!-- GPS accuracy label -->
    <rect x="280" y="420" width="120" height="28" rx="8" fill="#162440" stroke="#1E3A5F" stroke-width="1"/>
    <circle cx="296" cy="434" r="5" fill="#00C9A7"/>
    <text x="306" y="438" fill="#E2EAF4" font-size="10">Precisión: 8m</text>

    <!-- Distance label -->
    <rect x="48" y="240" width="110" height="28" rx="8" fill="#162440" stroke="#1E3A5F" stroke-width="1"/>
    <text x="60" y="258" fill="#00C9A7" font-size="10" font-weight="600">📍 Dentro del radio</text>

    <!-- ====== EMPLOYEE CARD ====== -->
    <rect x="28" y="473" width="384" height="90" fill="#0D1F3C"/>
    <!-- Avatar -->
    <circle cx="72" cy="518" r="26" fill="#162440" stroke="#1E3A5F" stroke-width="1"/>
    <circle cx="72" cy="510" r="10" fill="#4A6A8A" opacity="0.5"/>
    <ellipse cx="72" cy="530" rx="15" ry="8" fill="#4A6A8A" opacity="0.3"/>
    <!-- Employee info -->
    <text x="110" y="508" fill="#FFFFFF" font-size="15" font-weight="600">García, María</text>
    <text x="110" y="526" fill="#6B8DB5" font-size="11">Legajo: 1042 · Administración</text>
    <text x="110" y="544" fill="#4A6A8A" font-size="10">Categoría: Administrativa</text>

    <!-- ====== GPS VALIDATION STATUS ====== -->
    <rect x="28" y="563" width="384" height="52" fill="#0A1628"/>
    <rect x="48" y="573" width="344" height="32" rx="8" fill="#00C9A7" opacity="0.08" stroke="#00C9A7" stroke-width="1" stroke-opacity="0.3"/>
    <!-- Check icon -->
    <circle cx="72" cy="589" r="10" fill="#00C9A7" opacity="0.2"/>
    <path d="M67 589 L70 592 L77 585" stroke="#00C9A7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="88" y="586" fill="#00C9A7" font-size="11" font-weight="600">Ubicación verificada</text>
    <text x="88" y="600" fill="#4A6A8A" font-size="9">GPS validado · Sucursal Dardo Rocha · 12m del punto</text>

    <!-- ====== FICHAR BUTTON ====== -->
    <rect x="48" y="630" width="344" height="56" rx="14" fill="url(#btnGrad)"/>
    <text x="220" y="664" fill="#071428" font-size="16" font-weight="700" text-anchor="middle" letter-spacing="1">FICHAR ENTRADA</text>

    <!-- ====== LAST RECORDS ====== -->
    <rect x="28" y="700" width="384" height="52" fill="#0D1F3C"/>
    <text x="48" y="720" fill="#4A6A8A" font-size="9" font-weight="600" letter-spacing="1">ÚLTIMA FICHADA</text>
    <text x="48" y="738" fill="#E2EAF4" font-size="12">Ayer — Salida 17:32</text>
    <rect x="310" y="726" width="62" height="18" rx="9" fill="#00C9A7" opacity="0.15"/>
    <text x="341" y="739" fill="#00C9A7" font-size="10" text-anchor="middle">Normal</text>

  </g>

  <!-- ====== NOTCH ====== -->
  <rect x="148" y="28" width="144" height="26" rx="13" fill="#1A1A1E"/>

  <!-- ====== HOME INDICATOR ====== -->
  <rect x="170" y="736" width="100" height="4" rx="2" fill="#3A3A3E"/>

</svg>