<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c97a"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e8c97a" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#0b1120" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.9"/>

  <!-- Fingerprint lines - stylized concentric arcs -->
  <!-- Center dot -->
  <circle cx="100" cy="95" r="3" fill="url(#goldGrad)"/>

  <!-- Inner arcs -->
  <path d="M 88 95 A 12 12 0 0 1 112 95" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round"/>
  <path d="M 112 95 A 12 14 0 0 1 88 95" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- Second ring -->
  <path d="M 80 98 A 20 22 0 0 1 120 98" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <path d="M 118 90 A 20 22 0 0 1 82 90" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Third ring -->
  <path d="M 73 100 A 28 32 0 0 1 127 100" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <path d="M 125 85 A 28 30 0 0 1 75 85" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Fourth ring -->
  <path d="M 67 105 A 36 42 0 0 1 133 105" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M 131 80 A 36 38 0 0 1 69 80" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- Outer ring -->
  <path d="M 62 110 A 44 52 0 0 1 138 110" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 136 75 A 44 46 0 0 1 64 75" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Scan line effect -->
  <line x1="60" y1="95" x2="140" y2="95" stroke="#e8c97a" stroke-width="1" opacity="0.25" stroke-dasharray="3,3"/>

  <!-- Small digital accent dots -->
  <circle cx="65" cy="115" r="1.5" fill="#c9a84c" opacity="0.4"/>
  <circle cx="135" cy="115" r="1.5" fill="#c9a84c" opacity="0.4"/>
  <circle cx="70" cy="70" r="1.5" fill="#c9a84c" opacity="0.3"/>
  <circle cx="130" cy="70" r="1.5" fill="#c9a84c" opacity="0.3"/>

  <!-- Text -->
  <text x="100" y="150" text-anchor="middle" font-family="serif" font-size="18" font-weight="700" fill="url(#goldGrad)" letter-spacing="1">
    Digital
  </text>
  <text x="100" y="170" text-anchor="middle" font-family="serif" font-size="18" font-weight="700" fill="#e8c97a" letter-spacing="1">
    <tspan fill="url(#goldGrad)">One</tspan>
  </text>
</svg>
